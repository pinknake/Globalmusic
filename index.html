<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>GMusic Pro</title>

<meta name="theme-color" content="#121212">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,Arial,sans-serif;
}

body{
background:#121212;
color:#fff;
height:100vh;
overflow:hidden;
}

.app{
display:flex;
height:100vh;
}

.sidebar{
width:260px;
background:#000;
padding:20px;
display:flex;
flex-direction:column;
gap:20px;
}

.logo{
font-size:28px;
font-weight:700;
color:#1DB954;
}

.menu{
display:flex;
flex-direction:column;
gap:10px;
}

.menu button{
background:none;
border:none;
color:#fff;
padding:12px;
text-align:left;
border-radius:10px;
cursor:pointer;
}

.menu button:hover{
background:#222;
}

.main{
flex:1;
display:flex;
flex-direction:column;
overflow:hidden;
}

.header{
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
background:#181818;
}

.search{
width:300px;
padding:12px;
border:none;
outline:none;
border-radius:25px;
background:#282828;
color:#fff;
}

.content{
flex:1;
overflow-y:auto;
padding:20px;
}

.section-title{
font-size:24px;
margin-bottom:20px;
}

.song-list{
display:flex;
flex-direction:column;
gap:10px;
}

.song{
display:flex;
align-items:center;
gap:15px;
padding:10px;
background:#181818;
border-radius:10px;
cursor:pointer;
transition:.2s;
}

.song:hover{
background:#282828;
}

.song img{
width:60px;
height:60px;
border-radius:8px;
object-fit:cover;
}

.song-info{
flex:1;
}

.song-name{
font-weight:600;
}

.song-artist{
font-size:13px;
color:#aaa;
}

.player{
height:90px;
background:#181818;
display:flex;
align-items:center;
justify-content:space-between;
padding:15px 20px;
border-top:1px solid #333;
}

.now-playing{
display:flex;
align-items:center;
gap:12px;
width:300px;
}

.now-playing img{
width:60px;
height:60px;
border-radius:8px;
object-fit:cover;
}

.controls{
display:flex;
align-items:center;
gap:20px;
}

.controls button{
background:none;
border:none;
color:#fff;
font-size:24px;
cursor:pointer;
}

.progress-area{
display:flex;
align-items:center;
gap:10px;
width:40%;
}

.progress{
flex:1;
height:5px;
background:#444;
border-radius:10px;
overflow:hidden;
}

.progress-bar{
height:100%;
width:0%;
background:#1DB954;
}

.volume{
width:150px;
}

input[type=range]{
width:100%;
}

.floating-btn{
position:fixed;
bottom:110px;
right:20px;
background:#1DB954;
color:#fff;
border:none;
width:60px;
height:60px;
border-radius:50%;
font-size:28px;
cursor:pointer;
box-shadow:0 10px 20px rgba(0,0,0,.3);
}

.hidden{
display:none;
}

@media(max-width:768px){

.sidebar{
display:none;
}

.progress-area{
display:none;
}

.search{
width:180px;
}

.player{
height:100px;
padding:10px;
}

.now-playing{
width:auto;
}
}
</style>
</head>

<body>

<div class="app">

<div class="sidebar">
<div class="logo">GMusic</div>

<div class="menu">
<button>🏠 Home</button>
<button>❤️ Favorites</button>
<button>🎵 Playlists</button>
<button>💿 Albums</button>
<button>⚙ Settings</button>
</div>
</div>

<div class="main">

<div class="header">
<input
class="search"
placeholder="Search music..."
id="searchBox">
</div>

<div class="content">

<h2 class="section-title">
Your Library
</h2>

<div class="song-list" id="songList">

</div>

</div>

<div class="player">

<div class="now-playing">

<img
id="cover"
src="https://via.placeholder.com/300">

<div>
<div id="title">No Song</div>
<div id="artist">Unknown Artist</div>
</div>

</div>

<div class="controls">

<button id="prevBtn">
⏮
</button>

<button id="playBtn">
▶
</button>

<button id="nextBtn">
⏭
</button>

  <button id="shuffleBtn">🔀</button>
<button id="repeatBtn">🔁</button>
<button id="favBtn">❤️</button>
  

</div>

<div class="progress-area">

<span id="currentTime">
0:00
</span>

<div class="progress">
<div
class="progress-bar"
id="progressBar">
</div>
</div>

<span id="duration">
0:00
</span>

</div>

<div class="volume">
<input
type="range"
id="volume"
min="0"
max="1"
step="0.01"
value="1">
</div>

</div>

</div>

</div>

<button
class="floating-btn"
id="addMusic">
+
</button>

<input
type="file"
id="musicPicker"
multiple
accept="audio/*"
class="hidden">

<audio id="audio"></audio>


  <script>

const audio = document.getElementById("audio");
const musicPicker = document.getElementById("musicPicker");
const addMusic = document.getElementById("addMusic");

const songList = document.getElementById("songList");

const playBtn = document.getElementById("playBtn");
const nextBtn = document.getElementById("nextBtn");
const prevBtn = document.getElementById("prevBtn");

const title = document.getElementById("title");
const artist = document.getElementById("artist");
const cover = document.getElementById("cover");

const progressBar = document.getElementById("progressBar");
const currentTimeText = document.getElementById("currentTime");
const durationText = document.getElementById("duration");

const volumeSlider = document.getElementById("volume");
const searchBox = document.getElementById("searchBox");

let playlist = [];
let currentIndex = 0;
let isPlaying = false;

/* ---------- Open File Picker ---------- */

addMusic.addEventListener("click", () => {
    musicPicker.click();
});

/* ---------- Load Music Files ---------- */

musicPicker.addEventListener("change", (e) => {

    const files = Array.from(e.target.files);

    files.forEach(file => {

        const song = {
            name: file.name.replace(/\.[^/.]+$/, ""),
            file: file,
            url: URL.createObjectURL(file)
        };

        playlist.push(song);
    });

    renderSongs();

    if (playlist.length > 0 && audio.src === "") {
        loadSong(0);
    }

});

/* ---------- Render Playlist ---------- */

function renderSongs() {

    songList.innerHTML = "";

    playlist.forEach((song,index)=>{

        const item = document.createElement("div");

        item.className = "song";

        item.innerHTML = `
            <img src="https://via.placeholder.com/300">
            <div class="song-info">
                <div class="song-name">${song.name}</div>
                <div class="song-artist">Local File</div>
            </div>
        `;

        item.addEventListener("click",()=>{

            loadSong(index);
            playSong();

        });

        songList.appendChild(item);

    });

}

/* ---------- Load Song ---------- */

function loadSong(index){

    currentIndex = index;

    const song = playlist[index];

    audio.src = song.url;

    title.textContent = song.name;
    artist.textContent = "Local File";

    cover.src =
    "https://via.placeholder.com/300";

}

/* ---------- Play ---------- */

function playSong(){

    audio.play();

    isPlaying = true;

    playBtn.textContent = "⏸";

}

/* ---------- Pause ---------- */

function pauseSong(){

    audio.pause();

    isPlaying = false;

    playBtn.textContent = "▶";

}

/* ---------- Toggle ---------- */

playBtn.addEventListener("click",()=>{

    if(!playlist.length) return;

    if(isPlaying){
        pauseSong();
    }else{
        playSong();
    }

});

/* ---------- Next ---------- */

nextBtn.addEventListener("click",()=>{

    if(!playlist.length) return;

    currentIndex++;

    if(currentIndex >= playlist.length){
        currentIndex = 0;
    }

    loadSong(currentIndex);
    playSong();

});

/* ---------- Previous ---------- */

prevBtn.addEventListener("click",()=>{

    if(!playlist.length) return;

    currentIndex--;

    if(currentIndex < 0){
        currentIndex = playlist.length - 1;
    }

    loadSong(currentIndex);
    playSong();

});

/* ---------- Auto Next ---------- */

audio.addEventListener("ended",()=>{

    currentIndex++;

    if(currentIndex >= playlist.length){
        currentIndex = 0;
    }

    loadSong(currentIndex);
    playSong();

});

/* ---------- Progress ---------- */

audio.addEventListener("timeupdate",()=>{

    if(audio.duration){

        const percent =
        (audio.currentTime/audio.duration)*100;

        progressBar.style.width =
        percent + "%";

        currentTimeText.textContent =
        formatTime(audio.currentTime);

        durationText.textContent =
        formatTime(audio.duration);

    }

});

/* ---------- Time Format ---------- */

function formatTime(seconds){

    const mins =
    Math.floor(seconds/60);

    const secs =
    Math.floor(seconds%60);

    return mins + ":" +
    (secs < 10 ? "0"+secs : secs);

}

/* ---------- Volume ---------- */

volumeSlider.addEventListener("input",()=>{

    audio.volume =
    volumeSlider.value;

});

/* ---------- Search ---------- */

searchBox.addEventListener("input",()=>{

    const query =
    searchBox.value.toLowerCase();

    const songs =
    document.querySelectorAll(".song");

    songs.forEach(song=>{

        const text =
        song.innerText.toLowerCase();

        if(text.includes(query)){
            song.style.display="flex";
        }else{
            song.style.display="none";
        }

    });

});

</script>
