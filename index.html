<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1DB954">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
  
  <title>GMusic Pro</title>

<meta name="theme-color" content="#121212">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,Arial,sans-serif;
}

body{
background:#121212;
color:#fff;
min-height:100vh;
overflow:hidden;
}

.app{
display:flex;
height:100dvh;
}

.sidebar{
width:260px;
background:#000;
padding:20px;
display:flex;
flex-direction:column;
gap:20px;
}

.logo{
font-size:28px;
font-weight:700;
color:#1DB954;
}

.menu{
display:flex;
flex-direction:column;
gap:10px;
}

.menu button{
background:none;
border:none;
color:#fff;
padding:12px;
text-align:left;
border-radius:10px;
cursor:pointer;
}

.menu button:hover{
background:#222;
}

.main{
flex:1;
display:flex;
flex-direction:column;
overflow:hidden;
}

.header{
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
background:#181818;
}

.search{
width:300px;
padding:12px;
border:none;
outline:none;
border-radius:25px;
background:#282828;
color:#fff;
}

.content{
flex:1;
overflow-y:auto;
padding:20px;
}

.section-title{
font-size:24px;
margin-bottom:20px;
}

.song-list{
display:flex;
flex-direction:column;
gap:10px;
}

.song{
display:flex;
align-items:center;
gap:15px;
padding:10px;
background:#181818;
border-radius:10px;
cursor:pointer;
transition:.2s;
}

.song:hover{
background:#282828;
}

.song img{
width:60px;
height:60px;
border-radius:8px;
object-fit:cover;
}

.song-info{
flex:1;
}

.song-name{
font-weight:600;
}

.song-artist{
font-size:13px;
color:#aaa;
}

.player{
height:90px;
background:#181818;
display:flex;
align-items:center;
justify-content:space-between;
padding:15px 20px;
border-top:1px solid #333;
}

.now-playing{
display:flex;
align-items:center;
gap:12px;
width:300px;
}

.now-playing img{
width:60px;
height:60px;
border-radius:8px;
object-fit:cover;
}

.controls{
display:flex;
align-items:center;
gap:20px;
}

.controls button{
background:none;
border:none;
color:#fff;
font-size:24px;
cursor:pointer;
}

.progress-area{
display:flex;
align-items:center;
gap:10px;
width:40%;
}

.progress{
flex:1;
height:5px;
background:#444;
border-radius:10px;
overflow:hidden;
}

.progress-bar{
height:100%;
width:0%;
background:#1DB954;
}

.volume{
width:150px;
}

input[type=range]{
width:100%;
}

.floating-btn{
position:fixed;
bottom:110px;
right:20px;
background:#1DB954;
color:#fff;
border:none;
width:60px;
height:60px;
border-radius:50%;
font-size:28px;
cursor:pointer;
box-shadow:0 10px 20px rgba(0,0,0,.3);
}

.hidden{
display:none;
}

@media(max-width:768px){

.sidebar{
display:none;
}

.progress-area{
display:none;
}

.search{
width:180px;
}

.player{
height:100px;
padding:10px;
}

.now-playing{
width:auto;
}

  #installBtn{
position:fixed;
top:20px;
right:20px;
padding:10px 16px;
border:none;
border-radius:10px;
cursor:pointer;
  }
  
}
</style>
</head>

<body>

<div class="app">

<div class="sidebar">
<div class="logo">GMusic</div>

<div class="menu">
<button id="allSongsBtn">🎵 All Songs</button>
<button id="favPageBtn">❤️ Favorites</button>
<button id="playlistPageBtn">📂 Playlists</button>
<button id="albumPageBtn">💿 Albums</button>
  
</div>
</div>

<div class="main">

<div class="header">
<input
class="search"
placeholder="Search music..."
id="searchBox">
</div>

<div class="content">

<h2 class="section-title" id="pageTitle">
All Songs
</h2>

<div class="song-list" id="songList">

</div>

</div>

<div class="player">

<div class="now-playing">

<img
id="cover"
src="https://via.placeholder.com/300">

<div>
<div id="title">No Song</div>
<div id="artist">Unknown Artist</div>
</div>

</div>

<div class="controls">
 
  <button id="installBtn">
Install App
  </button>

<button id="prevBtn">
⏮
</button>

<button id="playBtn">
▶
</button>

<button id="nextBtn">
⏭
</button>

  <button id="shuffleBtn">🔀</button>
<button id="repeatBtn">🔁</button>
<button id="favBtn">❤️</button>
  

</div>

<div class="progress-area">

<span id="currentTime">
0:00
</span>

<div class="progress">
<div
class="progress-bar"
id="progressBar">
</div>
</div>

<span id="duration">
0:00
</span>

</div>

<div class="volume">
<input
type="range"
id="volume"
min="0"
max="1"
step="0.01"
value="1">
</div>

</div>

</div>

</div>

<button
class="floating-btn"
id="addMusic">
+
</button>

<input
type="file"
id="musicPicker"
multiple
accept="audio/*"
class="hidden">

<audio id="audio"></audio>

<script>
window.onerror = function(msg, src, line, col) {
  alert("ERROR: " + msg + " | Line: " + line);
};
</script>

  <script>

const audio = document.getElementById("audio");
const musicPicker = document.getElementById("musicPicker");
const addMusic = document.getElementById("addMusic");

const songList = document.getElementById("songList");

const playBtn = document.getElementById("playBtn");
const nextBtn = document.getElementById("nextBtn");
const prevBtn = document.getElementById("prevBtn");

const title = document.getElementById("title");
const artist = document.getElementById("artist");
const cover = document.getElementById("cover");

const progressBar = document.getElementById("progressBar");
const currentTimeText = document.getElementById("currentTime");
const durationText = document.getElementById("duration");

const volumeSlider = document.getElementById("volume");
const searchBox = document.getElementById("searchBox");

let playlist = [];
let currentIndex = 0;
let isPlaying = false;
    
/* ---------- Open File Picker ---------- */

addMusic.addEventListener("click", () => {
    musicPicker.click();
});

/* ---------- Load Music Files ---------- */

musicPicker.addEventListener("change", (e) => {

    const files = Array.from(e.target.files);

    files.forEach(file => {

        const song = {
            name: file.name.replace(/\.[^/.]+$/, ""),
            file: file,
            url: URL.createObjectURL(file)
        };

        playlist.push(song);
    });

    renderSongs();

    if (playlist.length > 0 && audio.src === "") {
        loadSong(0);
    }

});

/* ---------- Render Playlist ---------- */

function renderSongs() {

    songList.innerHTML = "";

    playlist.forEach((song,index)=>{

        const item = document.createElement("div");

        item.className = "song";

        item.innerHTML = `
            <img src="https://via.placeholder.com/300">
            <div class="song-info">
                <div class="song-name">${song.name}</div>
                <div class="song-artist">Local File</div>
            </div>
        `;

        item.addEventListener("click",()=>{

            loadSong(index);
            playSong();

        });

        songList.appendChild(item);

    });

}

    function renderFavorites(){

songList.innerHTML = "";

let count = 0;

playlist.forEach((song,index)=>{

if(favorites.includes(song.name)){

count++;

const item =
document.createElement("div");

item.className = "song";

item.innerHTML = `
<img src="https://via.placeholder.com/300">
<div class="song-info">
<div class="song-name">${song.name}</div>
<div class="song-artist">Favorite Song</div>
</div>
`;

item.onclick = ()=>{

loadSong(index);
playSong();

};

songList.appendChild(item);

}

});

if(count===0){

songList.innerHTML =
"<div class='song'>No Favorites Yet ❤️</div>";

}

}
    

/* ---------- Load Song ---------- */

function loadSong(index){

    currentIndex = index;

    const song = playlist[index];

    audio.src = song.url;

    title.textContent = song.name;
    artist.textContent = "Local File";

    cover.src =
    "https://via.placeholder.com/300";

}

/* ---------- Play ---------- */

function playSong(){

    audio.play();

    isPlaying = true;

    playBtn.textContent = "⏸";

}

/* ---------- Pause ---------- */

function pauseSong(){

    audio.pause();

    isPlaying = false;

    playBtn.textContent = "▶";

}

/* ---------- Toggle ---------- */

playBtn.addEventListener("click",()=>{

    if(!playlist.length) return;

    if(isPlaying){
        pauseSong();
    }else{
        playSong();
    }

});

/* ---------- Next ---------- */

nextBtn.addEventListener("click",()=>{

    if(!playlist.length) return;

    currentIndex++;

    if(currentIndex >= playlist.length){
        currentIndex = 0;
    }

    loadSong(currentIndex);
    playSong();

});

/* ---------- Previous ---------- */

prevBtn.addEventListener("click",()=>{

    if(!playlist.length) return;

    currentIndex--;

    if(currentIndex < 0){
        currentIndex = playlist.length - 1;
    }

    loadSong(currentIndex);
    playSong();

});

/* ---------- Auto Next ---------- */

audio.addEventListener("ended",()=>{

    currentIndex++;

    if(currentIndex >= playlist.length){
        currentIndex = 0;
    }

    loadSong(currentIndex);
    playSong();

});

/* ---------- Progress ---------- */

audio.addEventListener("timeupdate",()=>{

    if(audio.duration){

        const percent =
        (audio.currentTime/audio.duration)*100;

        progressBar.style.width =
        percent + "%";

        currentTimeText.textContent =
        formatTime(audio.currentTime);

        durationText.textContent =
        formatTime(audio.duration);

    }

});

/* ---------- Time Format ---------- */

function formatTime(seconds){

    const mins =
    Math.floor(seconds/60);

    const secs =
    Math.floor(seconds%60);

    return mins + ":" +
    (secs < 10 ? "0"+secs : secs);

}

/* ---------- Volume ---------- */

volumeSlider.addEventListener("input",()=>{

    audio.volume =
    volumeSlider.value;

});

/* ---------- Search ---------- */

searchBox.addEventListener("input",()=>{

    const query =
    searchBox.value.toLowerCase();

    const songs =
    document.querySelectorAll(".song");

    songs.forEach(song=>{

        const text =
        song.innerText.toLowerCase();

        if(text.includes(query)){
            song.style.display="flex";
        }else{
            song.style.display="none";
        }

    });

});


    /* ===================================
   PART 3
=================================== */

let shuffleMode = false;
let repeatMode = false;

const shuffleBtn =
document.getElementById("shuffleBtn");

const repeatBtn =
document.getElementById("repeatBtn");

const favBtn =
document.getElementById("favBtn");

/* ---------- FAVORITES ---------- */

let favorites =
JSON.parse(
localStorage.getItem("gmusic_favorites")
|| "[]"
);

function saveFavorites(){

localStorage.setItem(
"gmusic_favorites",
JSON.stringify(favorites)
);

}

favBtn.addEventListener("click",()=>{

if(!playlist.length) return;

const song =
playlist[currentIndex];

const id = song.name;

if(favorites.includes(id)){

favorites =
favorites.filter(
x=>x!==id
);

favBtn.textContent = "🤍";

}else{

favorites.push(id);

favBtn.textContent = "❤️";

}

saveFavorites();

});

function updateFavoriteUI(){

if(!playlist.length) return;

const song =
playlist[currentIndex];

if(
favorites.includes(song.name)
){
favBtn.textContent="❤️";
}else{
favBtn.textContent="🤍";
}

}


    let userPlaylists =
JSON.parse(
localStorage.getItem("gmusic_playlists")
|| "[]"
);

function savePlaylists(){

localStorage.setItem(
"gmusic_playlists",
JSON.stringify(userPlaylists)
);

}
    function renderPlaylists(){

const container =
document.getElementById(
"playlistContainer"
);

if(!container) return;

container.innerHTML="";

userPlaylists.forEach(list=>{

const div =
document.createElement("div");

div.className="song";

div.innerHTML=`
<div class="song-info">
<div class="song-name">
${list.name}
</div>
<div class="song-artist">
${list.songs.length} Songs
</div>
</div>
`;

container.appendChild(div);

});

}

    document.addEventListener(
"click",
(e)=>{

if(
e.target.id ===
"createPlaylistBtn"
){

const name =
prompt(
"Playlist Name"
);

if(!name) return;

userPlaylists.push({
name:name,
songs:[]
});

savePlaylists();

renderPlaylists();

}

}
);


    

/* ---------- SHUFFLE ---------- */

shuffleBtn.addEventListener("click",()=>{

shuffleMode =
!shuffleMode;

shuffleBtn.style.opacity =
shuffleMode ? "1" : ".5";

});

shuffleBtn.style.opacity=".5";

/* ---------- REPEAT ---------- */

repeatBtn.addEventListener("click",()=>{

repeatMode =
!repeatMode;

repeatBtn.style.opacity =
repeatMode ? "1" : ".5";

});

repeatBtn.style.opacity=".5";

/* ---------- SAVE SETTINGS ---------- */

function saveSettings(){

localStorage.setItem(
"gmusic_settings",
JSON.stringify({
shuffle:shuffleMode,
repeat:repeatMode,
volume:audio.volume
})
);

}

function loadSettings(){

const data =
JSON.parse(
localStorage.getItem(
"gmusic_settings"
)
);

if(!data) return;

shuffleMode =
data.shuffle || false;

repeatMode =
data.repeat || false;

audio.volume =
data.volume || 1;

volumeSlider.value =
audio.volume;

shuffleBtn.style.opacity =
shuffleMode ? "1" : ".5";

repeatBtn.style.opacity =
repeatMode ? "1" : ".5";

}

setInterval(saveSettings,1000);

/* ---------- OVERRIDE NEXT ---------- */

function playNextSong(){

if(!playlist.length) return;

if(repeatMode){

loadSong(currentIndex);
playSong();
return;

}

if(shuffleMode){

const randomIndex =
Math.floor(
Math.random() *
playlist.length
);

loadSong(randomIndex);
playSong();

return;

}

currentIndex++;

if(
currentIndex >=
playlist.length
){
currentIndex = 0;
}

loadSong(currentIndex);
playSong();

}

/* ---------- REPLACE OLD ENDED ---------- */

audio.addEventListener(
"ended",
playNextSong
);

/* ---------- UPDATE LOAD SONG ---------- */

const originalLoadSong =
loadSong;

loadSong = function(index){

originalLoadSong(index);

updateFavoriteUI();

};

/* ---------- SAVE LAST SONG ---------- */

function saveCurrentSong(){

if(!playlist.length) return;

localStorage.setItem(
"gmusic_last_song",
currentIndex
);

}

audio.addEventListener(
"timeupdate",
saveCurrentSong
);

/* ---------- RESTORE LAST SONG ---------- */

window.addEventListener(
"load",
()=>{

loadSettings();

const savedIndex =
localStorage.getItem(
"gmusic_last_song"
);

if(
savedIndex !== null &&
playlist.length
){

loadSong(
parseInt(savedIndex)
);

}

}
);

/* ---------- KEYBOARD SHORTCUTS ---------- */

document.addEventListener(
"keydown",
(e)=>{

if(e.code==="Space"){

e.preventDefault();

if(isPlaying){
pauseSong();
}else{
playSong();
}

}

if(e.code==="ArrowRight"){
nextBtn.click();
}

if(e.code==="ArrowLeft"){
prevBtn.click();
}

}
);

/* ---------- MINI TOAST ---------- */

function toast(text){

const div =
document.createElement("div");

div.innerText = text;

div.style.position="fixed";
div.style.bottom="120px";
div.style.left="50%";
div.style.transform=
"translateX(-50%)";

div.style.padding=
"12px 20px";

div.style.background=
"#1DB954";

div.style.borderRadius=
"12px";

div.style.zIndex="9999";

document.body.appendChild(div);

setTimeout(()=>{
div.remove();
},2000);

}

shuffleBtn.onclick=()=>{
shuffleMode=!shuffleMode;

shuffleBtn.style.opacity=
shuffleMode?"1":".5";

toast(
shuffleMode
?"Shuffle Enabled"
:"Shuffle Disabled"
);
};

repeatBtn.onclick=()=>{
repeatMode=!repeatMode;

repeatBtn.style.opacity=
repeatMode?"1":".5";

toast(
repeatMode
?"Repeat Enabled"
:"Repeat Disabled"
);
};

const pageTitle =
document.getElementById("pageTitle");

document
.getElementById("allSongsBtn")
.onclick = ()=>{

pageTitle.textContent =
"All Songs";

renderSongs();

};

document
.getElementById("favPageBtn")
.onclick = ()=>{

pageTitle.textContent =
"Favorites";

renderFavorites();

};

document
.getElementById("playlistPageBtn")
.onclick = ()=>{

pageTitle.textContent =
"Playlists";

songList.innerHTML = `
<div class="song">
<button id="createPlaylistBtn">
➕ Create Playlist
</button>
</div>

<div id="playlistContainer"></div>
`;

renderPlaylists();

};

document
.getElementById("albumPageBtn")
.onclick = ()=>{

pageTitle.textContent =
"Albums";

songList.innerHTML =
"<div class='song'>Albums Coming Soon</div>";

};



    
playlist.push({
  name: "Test Song",
  file: null,
  url: "./test.mp3"
});

renderSongs();
loadSong(0);

    let deferredPrompt;

window.addEventListener(
"beforeinstallprompt",
(e)=>{

e.preventDefault();

deferredPrompt = e;

document
.getElementById("installBtn")
.style.display="block";

});

document
.getElementById("installBtn")
.addEventListener("click",async()=>{

if(!deferredPrompt) return;

deferredPrompt.prompt();

await deferredPrompt.userChoice;

deferredPrompt = null;

});
    
  </script>

  <script src="songs.js"></script>
 
  <script>
if ("serviceWorker" in navigator) {

  window.addEventListener("load", () => {

    navigator.serviceWorker
      .register("./sw.js")
      .then(() => {

        console.log(
          "Service Worker Registered"
        );

      });

  });

}
</script>

</body>
</html>
