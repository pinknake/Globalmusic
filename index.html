<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>GMusic Pro</title>

<meta name="theme-color" content="#121212">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,Arial,sans-serif;
}

body{
background:#121212;
color:#fff;
height:100vh;
overflow:hidden;
}

.app{
display:flex;
height:100vh;
}

.sidebar{
width:260px;
background:#000;
padding:20px;
display:flex;
flex-direction:column;
gap:20px;
}

.logo{
font-size:28px;
font-weight:700;
color:#1DB954;
}

.menu{
display:flex;
flex-direction:column;
gap:10px;
}

.menu button{
background:none;
border:none;
color:#fff;
padding:12px;
text-align:left;
border-radius:10px;
cursor:pointer;
}

.menu button:hover{
background:#222;
}

.main{
flex:1;
display:flex;
flex-direction:column;
overflow:hidden;
}

.header{
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
background:#181818;
}

.search{
width:300px;
padding:12px;
border:none;
outline:none;
border-radius:25px;
background:#282828;
color:#fff;
}

.content{
flex:1;
overflow-y:auto;
padding:20px;
}

.section-title{
font-size:24px;
margin-bottom:20px;
}

.song-list{
display:flex;
flex-direction:column;
gap:10px;
}

.song{
display:flex;
align-items:center;
gap:15px;
padding:10px;
background:#181818;
border-radius:10px;
cursor:pointer;
transition:.2s;
}

.song:hover{
background:#282828;
}

.song img{
width:60px;
height:60px;
border-radius:8px;
object-fit:cover;
}

.song-info{
flex:1;
}

.song-name{
font-weight:600;
}

.song-artist{
font-size:13px;
color:#aaa;
}

.player{
height:90px;
background:#181818;
display:flex;
align-items:center;
justify-content:space-between;
padding:15px 20px;
border-top:1px solid #333;
}

.now-playing{
display:flex;
align-items:center;
gap:12px;
width:300px;
}

.now-playing img{
width:60px;
height:60px;
border-radius:8px;
object-fit:cover;
}

.controls{
display:flex;
align-items:center;
gap:20px;
}

.controls button{
background:none;
border:none;
color:#fff;
font-size:24px;
cursor:pointer;
}

.progress-area{
display:flex;
align-items:center;
gap:10px;
width:40%;
}

.progress{
flex:1;
height:5px;
background:#444;
border-radius:10px;
overflow:hidden;
}

.progress-bar{
height:100%;
width:0%;
background:#1DB954;
}

.volume{
width:150px;
}

input[type=range]{
width:100%;
}

.floating-btn{
position:fixed;
bottom:110px;
right:20px;
background:#1DB954;
color:#fff;
border:none;
width:60px;
height:60px;
border-radius:50%;
font-size:28px;
cursor:pointer;
box-shadow:0 10px 20px rgba(0,0,0,.3);
}

.hidden{
display:none;
}

@media(max-width:768px){

.sidebar{
display:none;
}

.progress-area{
display:none;
}

.search{
width:180px;
}

.player{
height:100px;
padding:10px;
}

.now-playing{
width:auto;
}
}
</style>
</head>

<body>

<div class="app">

<div class="sidebar">
<div class="logo">GMusic</div>

<div class="menu">
<button>🏠 Home</button>
<button>❤️ Favorites</button>
<button>🎵 Playlists</button>
<button>💿 Albums</button>
<button>⚙ Settings</button>
</div>
</div>

<div class="main">

<div class="header">
<input
class="search"
placeholder="Search music..."
id="searchBox">
</div>

<div class="content">

<h2 class="section-title">
Your Library
</h2>

<div class="song-list" id="songList">

</div>

</div>

<div class="player">

<div class="now-playing">

<img
id="cover"
src="https://via.placeholder.com/300">

<div>
<div id="title">No Song</div>
<div id="artist">Unknown Artist</div>
</div>

</div>

<div class="controls">

<button id="prevBtn">
⏮
</button>

<button id="playBtn">
▶
</button>

<button id="nextBtn">
⏭
</button>

</div>

<div class="progress-area">

<span id="currentTime">
0:00
</span>

<div class="progress">
<div
class="progress-bar"
id="progressBar">
</div>
</div>

<span id="duration">
0:00
</span>

</div>

<div class="volume">
<input
type="range"
id="volume"
min="0"
max="1"
step="0.01"
value="1">
</div>

</div>

</div>

</div>

<button
class="floating-btn"
id="addMusic">
+
</button>

<input
type="file"
id="musicPicker"
multiple
accept="audio/*"
class="hidden">

<audio id="audio"></audio>
