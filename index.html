<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1DB954">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
  
  <title>GMusic Pro</title>

<meta name="theme-color" content="#121212">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,Arial,sans-serif;
}

  .home-grid{
display:grid;
grid-template-columns:
repeat(auto-fill,minmax(150px,1fr));
gap:15px;
margin:15px 0 30px;
}

.home-card{
background:#181818;
padding:20px;
border-radius:12px;
cursor:pointer;
transition:.2s;
}

.home-card:hover{
background:#282828;
}

.home-section h2{
margin-top:20px;
margin-bottom:10px;
}

  .home-cover{
width:100%;
aspect-ratio:1;
object-fit:cover;
border-radius:10px;
margin-bottom:10px;
}

body{
background:#121212;
color:#fff;
min-height:100vh;
overflow:hidden;
}

.app{
display:flex;
height:100dvh;
}

.sidebar{
width:260px;
background:#000;
padding:20px;
display:flex;
flex-direction:column;
gap:20px;
}

.logo{
font-size:28px;
font-weight:700;
color:#1DB954;
}

.menu{
display:flex;
flex-direction:column;
gap:10px;
}

.menu button{
background:none;
border:none;
color:#fff;
padding:12px;
text-align:left;
border-radius:10px;
cursor:pointer;
}

.menu button:hover{
background:#222;
}

.main{
flex:1;
display:flex;
flex-direction:column;
overflow:hidden;
}

.header{
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
background:#181818;
}

.search{
width:300px;
padding:12px;
border:none;
outline:none;
border-radius:25px;
background:#282828;
color:#fff;
}

.content{
flex:1;
overflow-y:auto;
padding:20px;
}

.section-title{
font-size:24px;
margin-bottom:20px;
}

.song-list{
display:grid;
grid-template-columns:
repeat(auto-fill,minmax(180px,1fr));
gap:20px;
}

.song{
background:#181818;
padding:15px;
border-radius:16px;
cursor:pointer;
transition:.3s;
display:flex;
flex-direction:column;
align-items:center;
text-align:center;
}

.song:hover{
background:#282828;
transform:translateY(-4px);
}

.song img{
width:100%;
height:180px;
border-radius:12px;
object-fit:cover;
margin-bottom:10px;
}

.song-info{
flex:1;
}

.song-name{
font-size:15px;
font-weight:700;
margin-top:5px;
}

.song-artist{
font-size:12px;
color:#b3b3b3;
margin-top:4px;
}

  .song.active-song{
border:2px solid #1DB954;
box-shadow:0 0 20px rgba(29,185,84,.4);
}

  #title{
font-size:16px;
font-weight:700;
}

#artist{
font-size:13px;
color:#aaa;
margin-top:4px;
}
  
.player{
height:90px;
background:#181818;
display:flex;
align-items:center;
justify-content:space-between;
padding:15px 20px;
border-top:1px solid #333;
}

.now-playing{
display:flex;
align-items:center;
gap:12px;
width:300px;
}

.now-playing img{
width:75px;
height:75px;
border-radius:12px;
object-fit:cover;
}

  #playBtn{
background:#1DB954;
width:50px;
height:50px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
}
  
.controls{
display:flex;
align-items:center;
gap:20px;
}

.controls button{
background:none;
border:none;
color:#fff;
font-size:24px;
cursor:pointer;
transition:.2s;
}

.controls button:hover{
transform:scale(1.15);
}
  
.progress-area{
display:flex;
align-items:center;
gap:10px;
width:40%;
}

.progress{
flex:1;
height:5px;
background:#444;
border-radius:10px;
overflow:hidden;
}

.progress-bar{
height:100%;
width:0%;
background:#1DB954;
}

.volume{
width:150px;
}

input[type=range]{
width:100%;
}

.floating-btn{
position:fixed;
bottom:110px;
right:20px;
background:#1DB954;
color:#fff;
border:none;
width:60px;
height:60px;
border-radius:50%;
font-size:28px;
cursor:pointer;
box-shadow:0 10px 20px rgba(0,0,0,.3);
}

  .full-player{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#121212;
z-index:99999;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:20px;
}

.full-player img{
width:80%;
max-width:350px;
border-radius:20px;
margin-bottom:25px;
}

.full-controls{
display:flex;
gap:30px;
margin-top:25px;
}

.full-controls button{
font-size:32px;
background:none;
border:none;
color:white;
}

#closePlayer{
position:absolute;
top:20px;
right:20px;
font-size:28px;
background:none;
border:none;
color:white;
}

  .full-progress-area{
display:flex;
align-items:center;
gap:10px;
width:90%;
max-width:400px;
margin-top:20px;
}

.full-progress{
flex:1;
height:6px;
background:#444;
border-radius:20px;
overflow:hidden;
}

.full-progress-bar{
height:100%;
width:0%;
background:#1DB954;
}

.hidden{
display:none;
}

@media(max-width:768px){

.sidebar{
display:none;
}

.progress-area{
display:none;
}

.search{
width:180px;
}

.player{
height:100px;
padding:10px;
}

.now-playing{
width:auto;
}

  #installBtn{
position:fixed;
top:20px;
right:20px;
padding:10px 16px;
border:none;
border-radius:10px;
cursor:pointer;
  }

    @keyframes spinCover{

from{
transform:rotate(0deg);
}

to{
transform:rotate(360deg);
}

}

.cover-rotate{

animation:
spinCover 12s linear infinite;

}
  
}

</style>
</head>

0:00
</span>

<div
id="fullProgressBar"
class="full-progress-bar">

  <audio id="audio"></audio>

  <script>

const homeBtn =document.getElementById("homeBtn");
const audio = document.getElementById("audio");
const musicPicker = document.getElementById("musicPicker");
const addMusic = document.getElementById("addMusic");

const songList = document.getElementById("songList");

const playBtn = document.getElementById("playBtn");
const nextBtn = document.getElementById("nextBtn");
const prevBtn = document.getElementById("prevBtn");

const title = document.getElementById("title");
const artist = document.getElementById("artist");
const cover = document.getElementById("cover");

const progressBar = document.getElementById("progressBar");
const currentTimeText = document.getElementById("currentTime");
const durationText = document.getElementById("duration");

const volumeSlider = document.getElementById("volume");
const searchBox = document.getElementById("searchBox");

    const fullProgressBar =
document.getElementById(
"fullProgressBar"
);

const fullCurrentTime =
document.getElementById(
"fullCurrentTime"
);

const fullDuration =
document.getElementById(
"fullDuration"
);

    const albumsBtn =
document.getElementById(
"albumsBtn"
);

    const queueList =
document.getElementById(
"queueList"
);

const queueTitle =
document.getElementById(
"queueTitle"
);

    const recentList =
document.getElementById(
"recentList"
);
    
let playlist = [];
let currentIndex = 0;
let isPlaying = false;
let recentSongs =
JSON.parse(
localStorage.getItem(
"gmusic_recent"
) || "[]"
);

 function showHome(){

pageTitle.textContent =
"Home";

songList.innerHTML = `

<div class="home-section">

<h2>Recently Played</h2>

<div class="home-grid">

${recentSongs.map(song=>

`<div class="home-card recent-card"
data-song="${song}">

<img
src="${
playlist.find(
s=>s.name===song
)?.cover || 'cover.png'
}"
class="home-cover">

<div>
${song}
</div>

</div>`

).join("")}

</div>

<h2>Albums</h2>

<div class="home-grid">

${albums.map(album=>

`<div class="home-card album-card"
data-album="${album.name}">

<img
src="${album.cover}"
class="home-cover">

<div>
${album.name}
</div>

</div>`

).join("")}

</div>

<h2>Playlists</h2>

<div class="home-grid">

${userPlaylists.map(list=>

`<div class="home-card playlist-card"
data-playlist="${list.name}">

<img
src="cover.jpg"
class="home-cover">

<div>
${list.name}
</div>

</div>`

).join("")}

</div>

</div>

`;

   document
.querySelectorAll(".album-card")
.forEach(card=>{

card.onclick=()=>{

openAlbum(
card.dataset.album
);

};

});

document
.querySelectorAll(".playlist-card")
.forEach(card=>{

card.onclick=()=>{

openPlaylist(
card.dataset.playlist
);

};

});

document
.querySelectorAll(".recent-card")
.forEach(card=>{

card.onclick=()=>{

const song =
playlist.find(
s=>s.name===
card.dataset.song
);

if(!song) return;

const index =
playlist.indexOf(song);

loadSong(index);
playSong();

};

});
   
}
    
/* ---------- Open File Picker ---------- */

addMusic.addEventListener("click", () => {
    musicPicker.click();
});

/* ---------- Load Music Files ---------- */

musicPicker.addEventListener("change", (e) => {

    const files = Array.from(e.target.files);

    files.forEach(file => {

        const song = {
            name: file.name.replace(/\.[^/.]+$/, ""),
            file: file,
            url: URL.createObjectURL(file)
        };

        playlist.push(song);
    });

    renderSongs();

    if (playlist.length > 0 && audio.src === "") {
        loadSong(0);
    }

});

/* ---------- Render Playlist ---------- */

function renderSongs() {

    songList.innerHTML = "";

    playlist.forEach((song,index)=>{

        const item = document.createElement("div");

        item.className =
index === currentIndex
? "song active-song"
: "song";
      
        item.innerHTML = `
            <img src="${
song.cover || 'cover.png'
}">
            <div class="song-info">
                <div class="song-name">${song.name}</div>
                <div class="song-artist">Local File</div>
            </div>
        `;

        item.addEventListener("click",()=>{

            loadSong(index);
            playSong();

        });

        songList.appendChild(item);

    });

}

    function renderFavorites(){

songList.innerHTML = "";

let count = 0;

playlist.forEach((song,index)=>{

if(favorites.includes(song.name)){

count++;

const item =
document.createElement("div");

item.className = "song";

item.innerHTML = `
<img src="cover.jpg">
<div class="song-info">
<div class="song-name">${song.name}</div>
<div class="song-artist">Favorite Song</div>
</div>
`;

item.onclick = ()=>{

loadSong(index);
playSong();

};

songList.appendChild(item);

}

});

if(count===0){

songList.innerHTML =
"<div class='song'>No Favorites Yet ❤️</div>";

}

}

    function renderPlaylists(){

const container =
document.getElementById(
"playlistContainer"
);

if(!container) return;

container.innerHTML="";

userPlaylists.forEach(list=>{

const div =
document.createElement("div");

div.className="song";

div.innerHTML=`
<div class="song-info">
<div class="song-name">
${list.name}
</div>
<div class="song-artist">
${list.songs.length} Songs
</div>
</div>
<button class="openPlaylistBtn">
Open
</button>
`;

  div.querySelector(
".openPlaylistBtn"
).onclick = ()=>{

openPlaylist(
list.name
);

};
  
  container.appendChild(div);

});

}

function renderQueue(){

queueList.innerHTML = "";

playlist.forEach((song,index)=>{

if(index <= currentIndex)
return;

const item =
document.createElement("div");

item.className = "song";

item.innerHTML = `
<div class="song-info">
<div class="song-name">
${song.name}
</div>
<div class="song-artist">
Up Next
</div>
</div>
`;

item.onclick = ()=>{

loadSong(index);
playSong();

renderQueue();

};

queueList.appendChild(item);

});

}

    function renderRecentSongs(){

if(!recentList) return;

recentList.innerHTML = "";

recentSongs.forEach(songName=>{

const song =
playlist.find(
s=>s.name===songName
);

if(!song) return;

const index =
playlist.indexOf(song);

const item =
document.createElement("div");

item.className = "song";

item.innerHTML = `
<div class="song-info">
<div class="song-name">
${song.name}
</div>
<div class="song-artist">
Recently Played
</div>
</div>
`;

item.onclick = ()=>{

loadSong(index);
playSong();

};

recentList.appendChild(item);

});

}
    
    function saveRecentSong(songName){

recentSongs =
recentSongs.filter(
s => s !== songName
);

recentSongs.unshift(songName);

if(recentSongs.length > 10){
recentSongs.pop();
}

localStorage.setItem(
"gmusic_recent",
JSON.stringify(recentSongs)
  
);
      
}
 
    function openPlaylist(name){

      window.currentPlaylistName = name;
      
pageTitle.textContent =
name;

songList.innerHTML = "";

const target =
userPlaylists.find(
p=>p.name===name
);

if(!target) return;

target.songs.forEach(songName=>{

const song =
playlist.find(
s=>s.name===songName
);

if(!song) return;

const index =
playlist.indexOf(song);

const item =
document.createElement("div");

item.className="song";

item.innerHTML=`
<div class="song-info">
<div class="song-name">
${song.name}
</div>
<div class="song-artist">
Playlist Song
</div>
</div>

<button class="removePlaylistSong">
❌
</button>
`;

item.onclick=()=>{

loadSong(index);
playSong();

};

  item.querySelector(
".removePlaylistSong"
).onclick=(e)=>{

e.stopPropagation();

removeSongFromPlaylist(
song.name
);

};

songList.appendChild(item);

});

}

    function showAlbums(){

pageTitle.textContent =
"Albums";

songList.innerHTML = "";

albums.forEach(album=>{

const item =
document.createElement("div");

item.className = "song";

item.innerHTML = `
<img src="${album.cover}">
<div class="song-info">
<div class="song-name">
${album.name}
</div>
<div class="song-artist">
${album.songs.length} Songs
</div>
</div>
`;

item.onclick = ()=>{

openAlbum(album.name);

};

songList.appendChild(item);

});

}
    
function openAlbum(name){

pageTitle.textContent =
name;

songList.innerHTML = "";

const target =
albums.find(
a=>a.name===name
);

if(!target) return;

target.songs.forEach(songName=>{

const song =
playlist.find(
s=>s.name===songName
);

if(!song) return;

const index =
playlist.indexOf(song);

const item =
document.createElement("div");

item.className="song";

item.innerHTML=`
<img src="${target.cover}">
<div class="song-info">
<div class="song-name">
${song.name}
</div>
<div class="song-artist">
Album Song
</div>
</div>
`;

item.onclick=()=>{

loadSong(index);
playSong();

};

songList.appendChild(item);

});

}
    
function removeSongFromPlaylist(songName){

const target =
userPlaylists.find(
p=>p.name===
window.currentPlaylistName
);

if(!target) return;

target.songs =
target.songs.filter(
s=>s!==songName
);

savePlaylists();

openPlaylist(
window.currentPlaylistName
);

toast(
"Song Removed"
);

}
    
function updateActiveSong(){

const cards =
songList.querySelectorAll(".song");

cards.forEach(card=>{

card.classList.remove(
"active-song"
);

});

if(cards[currentIndex]){

cards[currentIndex]
.classList.add(
"active-song"
);

}

}
    

/* ---------- Load Song ---------- */

function loadSong(index){

    currentIndex = index;

    const song = playlist[index];

    audio.src = song.url;

  saveRecentSong(song.name);

   renderRecentSongs();

    title.textContent = song.name;
    artist.textContent = "Local File";

    cover.src =
song.cover || "cover.png";
  
  document.getElementById("fullCover").src =
cover.src;

document.getElementById("fullTitle").textContent =
song.name;

document.getElementById("fullArtist").textContent =
"Local File";

  updateActiveSong();
  renderQueue();
}
    

/* ---------- Play ---------- */

function playSong(){

    audio.play();

    isPlaying = true;

    playBtn.textContent = "⏸";

  cover.classList.add(
"cover-rotate"
);

  document
.getElementById("fullPlay")
.textContent = "⏸";

  document
.getElementById("fullCover")
.classList.add(
"cover-rotate"
);

}

/* ---------- Pause ---------- */

function pauseSong(){

    audio.pause();

    isPlaying = false;

    playBtn.textContent = "▶";

  cover.classList.remove(
"cover-rotate"
);

  document
.getElementById("fullPlay")
.textContent = "▶";

  document
.getElementById("fullCover")
.classList.remove(
"cover-rotate"
);

}

/* ---------- Toggle ---------- */

playBtn.addEventListener("click",()=>{

    if(!playlist.length) return;

    if(isPlaying){
        pauseSong();
    }else{
        playSong();
    }

});

/* ---------- Next ---------- */

nextBtn.addEventListener("click",()=>{

    if(!playlist.length) return;

    currentIndex++;

    if(currentIndex >= playlist.length){
        currentIndex = 0;
    }

    loadSong(currentIndex);
    playSong();

});

/* ---------- Previous ---------- */

prevBtn.addEventListener("click",()=>{

    if(!playlist.length) return;

    currentIndex--;

    if(currentIndex < 0){
        currentIndex = playlist.length - 1;
    }

    loadSong(currentIndex);
    playSong();

});

/* ---------- Auto Next ---------- */

audio.addEventListener("ended",()=>{

    currentIndex++;

    if(currentIndex >= playlist.length){
        currentIndex = 0;
    }

    loadSong(currentIndex);
    playSong();

});

/* ---------- Progress ---------- */

audio.addEventListener("timeupdate",()=>{

    if(audio.duration){

        const percent =
        (audio.currentTime/audio.duration)*100;

        progressBar.style.width =
        percent + "%";

        currentTimeText.textContent =
        formatTime(audio.currentTime);

        durationText.textContent =
        formatTime(audio.duration);

      fullProgressBar.style.width =
percent + "%";

fullCurrentTime.textContent =
formatTime(audio.currentTime);

fullDuration.textContent =
formatTime(audio.duration);
      
    }

});

/* ---------- Time Format ---------- */

function formatTime(seconds){

    const mins =
    Math.floor(seconds/60);

    const secs =
    Math.floor(seconds%60);

    return mins + ":" +
    (secs < 10 ? "0"+secs : secs);

}

/* ---------- Volume ---------- */

volumeSlider.addEventListener("input",()=>{

    audio.volume =
    volumeSlider.value;

});

/* ---------- Search ---------- */

searchBox.addEventListener("input",()=>{

    const query =
    searchBox.value.toLowerCase();

    const songs =
    document.querySelectorAll(".song");

    songs.forEach(song=>{

        const text =
        song.innerText.toLowerCase();

        if(text.includes(query)){
            song.style.display="flex";
        }else{
            song.style.display="none";
        }

    });

});


    /* ===================================
   PART 3
=================================== */

let shuffleMode = false;
let repeatMode = false;

const shuffleBtn =

/* ---------- SAVE SETTINGS ---------- */

function saveSettings(){

localStorage.setItem(
"gmusic_settings",
JSON.stringify({
shuffle:shuffleMode,
repeat:repeatMode,
volume:audio.volume
})
);

}

function loadSettings(){

const data =
JSON.parse(
localStorage.getItem(
"gmusic_settings"
)
);

if(!data) return;

shuffleMode =
data.shuffle || false;

repeatMode =
data.repeat || false;

audio.volume =
data.volume || 1;

volumeSlider.value =
audio.volume;

shuffleBtn.style.opacity =
shuffleMode ? "1" : ".5";

repeatBtn.style.opacity =
repeatMode ? "1" : ".5";

}

setInterval(saveSettings,1000);

/* ---------- OVERRIDE NEXT ---------- */

function playNextSong(){

if(!playlist.length) return;

if(repeatMode){

loadSong(currentIndex);
playSong();
return;

}

if(shuffleMode){

const randomIndex =
Math.floor(
Math.random() *
playlist.length
);

loadSong(randomIndex);
playSong();

return;

}

currentIndex++;

if(
currentIndex >=
playlist.length
){
currentIndex = 0;
}

loadSong(currentIndex);
playSong();

}

/* ---------- REPLACE OLD ENDED ---------- */

audio.addEventListener(
"ended",
playNextSong
);

/* ---------- MINI TOAST ---------- */

function toast(text){

const div =
document.createElement("div");

div.innerText = text;

div.style.position="fixed";
div.style.bottom="120px";
div.style.left="50%";
div.style.transform=
"translateX(-50%)";

div.style.padding=
"12px 20px";

div.style.background=
"#1DB954";

div.style.borderRadius=
"12px";

div.style.zIndex="9999";

document.body.appendChild(div);

setTimeout(()=>{
div.remove();
},2000);

}

addToPlaylistBtn.addEventListener("click",()=>{

if(!playlist.length) return;

if(userPlaylists.length===0){

alert(
"Create a playlist first"
);

return;

}

const listNames =
userPlaylists
.map(p=>p.name)
.join("\n");

const selected =
prompt(
"Enter Playlist Name:\n\n" +
listNames
);

if(!selected) return;

const target =
userPlaylists.find(
p=>p.name===selected
);

if(!target){

alert(
"Playlist not found"
);

return;

}

const song =
playlist[currentIndex];

if(
!target.songs.includes(
song.name
)
){

target.songs.push(
song.name
);

savePlaylists();

alert(
"Added to " +
target.name
);

}else{

alert(
"Song already exists"
);

}

});

    document
.querySelector(".progress")
.addEventListener("click",(e)=>{

if(!audio.duration) return;

const rect =
e.currentTarget
.getBoundingClientRect();

const percent =
(e.clientX - rect.left) /
rect.width;

audio.currentTime =
percent *
audio.duration;

});
